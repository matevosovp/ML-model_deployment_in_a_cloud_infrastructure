name: Service checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: services/ml_service/requirements.txt

      - name: Install runtime dependencies
        run: pip install -r services/ml_service/requirements.txt

      - name: Check dependency consistency
        run: pip check

      - name: Check Python syntax and service imports
        run: |
          python -m compileall -q services/ml_service services/load_test.py
          PYTHONPATH=services python -c "from ml_service.main import app; assert app.title"

      - name: Check shell scripts
        run: |
          bash -n services/run_stage1.sh
          bash -n services/run_stage2_docker.sh

      - name: Validate configuration files
        run: |
          python -m json.tool dashboard.json > /dev/null
          cp services/.env.example services/.env
          cd services
          docker compose config --quiet
